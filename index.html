<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maryland Day">
<title>Smith Business Idea Challenge 2026</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #E21833 0%, #FFD200 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
}

body::before, body::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  z-index: 0;
}
body::before {
  width: 500px;
  height: 500px;
  top: -200px;
  right: -200px;
}
body::after {
  width: 400px;
  height: 400px;
  bottom: -150px;
  left: -150px;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 600px;
}

.logo {
  width: 120px;
  height: 120px;
  margin: 0 auto 30px;
  background: white;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  font-size: 60px;
}

.school-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  opacity: 0.9;
  margin-bottom: 12px;
  text-transform: uppercase;
}

h1 {
  font-size: 52px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 20px;
  text-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
}

.subtitle {
  font-size: 22px;
  font-weight: 500;
  opacity: 0.95;
  margin-bottom: 40px;
  line-height: 1.4;
}

.features {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 50px;
  flex-wrap: wrap;
}

.feature {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 20px 24px;
  min-width: 140px;
}

.feature-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.feature-text {
  font-size: 14px;
  font-weight: 600;
  opacity: 0.95;
}

.cta-button {
  display: inline-block;
  padding: 22px 60px;
  background: white;
  color: #E21833;
  text-decoration: none;
  border-radius: 50px;
  font-size: 22px;
  font-weight: 700;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
  transition: transform 0.2s, box-shadow 0.2s;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

.cta-button:active {
  transform: scale(0.96);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
}

.footer {
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 13px;
  opacity: 0.8;
  z-index: 1;
}

@media (max-width: 600px) {
  h1 { font-size: 36px; }
  .subtitle { font-size: 18px; }
  .logo { width: 90px; height: 90px; font-size: 45px; }
  .features { gap: 12px; }
  .feature { padding: 14px 18px; min-width: 100px; }
  .feature-icon { font-size: 24px; }
  .feature-text { font-size: 12px; }
  .cta-button { padding: 18px 44px; font-size: 18px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">🚀</div>
  <div class="school-name">Robert H. Smith School of Business</div>
  <h1>Business Idea Challenge</h1>
  <p class="subtitle">Pitch your startup. Get AI coaching.<br>Win a prize at Maryland Day 2026!</p>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">💡</div>
      <div class="feature-text">Share Your Idea</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🎯</div>
      <div class="feature-text">AI Feedback</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🏆</div>
      <div class="feature-text">Win Prizes</div>
    </div>
  </div>

  <a href="https://udify.app/chat/jXxgaMoHYmK7P4Nn" class="cta-button">
    Start Now →
  </a>
</div>

<div class="footer">
  Powered by Smith School · Maryland Day 2026
</div>

</body>
</html>
